<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAX Explainer Pro — AI-Powered</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #0f0f1a;
    --bg-light: #1a1a2e;
    --accent: #00d9ff;
    --accent-warm: #ff6b9d;
    --success: #00ff88;
    --text-primary: #ffffff;
    --text-secondary: #a0a0b0;
    --border: #2a2a40;
    --panel: #16161f; 
  }
 
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
   
  html, body {
    height: 100%;
  }
 
  body {
    background: linear-gradient(135deg, var(--bg-dark) 0%, #1a0f2e 100%);
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
  }
 
  /* Animated gradient background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(circle at 20% 50%, rgba(0, 217, 255, 0.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(255, 107, 157, 0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
 
  /* Main container */
  .container {
    display: flex;
    height: 100%;
    position: relative;
    z-index: 1;
  }
 
  /* Header */
  header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 70px;
    background: rgba(15, 15, 26, 0.9);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    z-index: 100;
  }
 
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: -0.5px;
  }
 
  .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent-warm));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 800;
    color: var(--bg-dark);
  }
 
  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-secondary);
  }
 
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--success);
    animation: pulse 2s ease-in-out infinite;
  }
 
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
 
  /* Main content */
  main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    padding: 100px 32px 32px;
    height: 100%;
    overflow: hidden;
  }
 
  @media (max-width: 1024px) {
    main {
      grid-template-columns: 1fr;
      padding: 100px 20px 20px;
      gap: 16px;
    }
  }
 
  /* Panels */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  }
 
  .panel-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
 
  .panel-title {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
  }
 
  .panel-content {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
 
  /* Input area */
  .input-group {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
 
  .input-label {
    font-size: 12px;
    color: var(--text-secondary);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
 
  textarea {
    flex: 1;
    min-height: 220px;
    background: var(--bg-light);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
    resize: none;
    outline: none;
    transition: all 0.2s;
  }
 
  textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0, 217, 255, 0.1);
  }
 
  textarea::placeholder {
    color: var(--text-secondary);
  }
 
  /* Examples */
  .examples {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
 
  .example-btn {
    padding: 6px 14px;
    background: rgba(0, 217, 255, 0.1);
    border: 1px solid rgba(0, 217, 255, 0.3);
    border-radius: 6px;
    color: var(--accent);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'JetBrains Mono', monospace;
  }
 
  .example-btn:hover {
    background: rgba(0, 217, 255, 0.2);
    border-color: var(--accent);
  }
 
  /* Controls */
  .controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
 
  select {
    flex: 1;
    min-width: 140px;
    padding: 10px 14px;
    background: var(--bg-light);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    outline: none;
    cursor: pointer;
    transition: all 0.2s;
  }
 
  select:focus {
    border-color: var(--accent);
  }
 
  .btn {
    flex: 1.5;
    min-width: 160px;
    padding: 12px 24px;
    background: linear-gradient(135deg, var(--accent), #00a8cc);
    border: none;
    border-radius: 8px;
    color: var(--bg-dark);
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
 
  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 24px rgba(0, 217, 255, 0.2);
  }
 
  .btn:active {
    transform: translateY(0);
  }
 
  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }
 
  .spinner {
    width: 12px;
    height: 12px;
    border: 2px solid rgba(15, 15, 26, 0.2);
    border-top-color: var(--bg-dark);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
 
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
 
  .spinner.hidden {
    display: none;
  }
 
  /* Output area */
  .output-content {
    flex: 1;
    overflow-y: auto;
  }
 
  .result-section {
    background: rgba(0, 217, 255, 0.05);
    border: 1px solid rgba(0, 217, 255, 0.2);
    border-radius: 8px;
    margin-bottom: 16px;
    overflow: hidden;
    animation: slideUp 0.4s ease;
  }
 
  @keyframes slideUp {
    from {
      opacity: 0;
      transform: translateY(12px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
 
  .result-header {
    padding: 14px 16px;
    background: rgba(0, 217, 255, 0.1);
    border-bottom: 1px solid rgba(0, 217, 255, 0.2);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
  }
 
  .result-body {
    padding: 16px;
    font-size: 13px;
    line-height: 1.7;
    color: #c0d0e8;
  }
 
  .result-body p {
    margin-bottom: 10px;
  }
 
  .result-body p:last-child {
    margin-bottom: 0;
  }
 
  .breakdown-item {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 12px;
    margin-bottom: 10px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(0, 217, 255, 0.1);
  }
 
  .breakdown-item:last-child {
    border-bottom: none;
    margin-bottom: 0;
    padding-bottom: 0;
  }
 
  .code-tag {
    background: rgba(0, 217, 255, 0.15);
    border: 1px solid rgba(0, 217, 255, 0.3);
    color: var(--accent);
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 11px;
    white-space: nowrap;
    font-weight: 600;
  }
 
  .breakdown-text {
    color: #a8c0e0;
    font-size: 12px;
  }
 
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-secondary);
    text-align: center;
  }
 
  .empty-icon {
    font-size: 48px;
    margin-bottom: 12px;
    opacity: 0.4;
  }
 
  .empty-text {
    font-size: 12px;
    line-height: 1.7;
  }
 
  .error-box {
    background: rgba(255, 107, 157, 0.1);
    border: 1px solid rgba(255, 107, 157, 0.3);
    border-radius: 8px;
    padding: 14px;
    color: var(--accent-warm);
    font-size: 12px;
    display: none;
  }
 
  .copy-btn {
    align-self: flex-end;
    padding: 8px 16px;
    background: rgba(0, 255, 136, 0.1);
    border: 1px solid rgba(0, 255, 136, 0.3);
    border-radius: 6px;
    color: var(--success);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 12px;
  }
 
  .copy-btn:hover {
    background: rgba(0, 255, 136, 0.2);
    border-color: var(--success);
  }
 
  /* Scrollbar styling */
  ::-webkit-scrollbar {
    width: 8px;
  }
 
  ::-webkit-scrollbar-track {
    background: transparent;
  }
 
  ::-webkit-scrollbar-thumb {
    background: rgba(0, 217, 255, 0.3);
    border-radius: 4px;
  }
 
  ::-webkit-scrollbar-thumb:hover {
    background: rgba(0, 217, 255, 0.5);
  }
</style>
</head>
<body>
 
<header>
  <div class="logo">
    <div class="logo-icon">Σ</div>
    <div>DAX Explainer Pro</div>
  </div>
  <div class="status">
    <div class="status-dot"></div>
    Ready to explain
  </div>
</header>
 
<main>
  <!-- Left Panel: Input -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">📊 DAX Input</span>
    </div>
    <div class="panel-content">
      <textarea 
        id="daxInput"
        placeholder="Paste your DAX measure here...
 
Example:
Total Sales YoY % = DIVIDE(
  [Total Sales] - CALCULATE([Total Sales], SAMEPERIODLASTYEAR('Date'[Date])),
  CALCULATE([Total Sales], SAMEPERIODLASTYEAR('Date'[Date]))
)"></textarea>
 
      <div>
        <div class="input-label">Quick Examples</div>
        <div class="examples">
          <button class="example-btn" onclick="loadExample('yoy')">YoY Growth %</button>
          <button class="example-btn" onclick="loadExample('rank')">RANKX Ranking</button>
          <button class="example-btn" onclick="loadExample('calculate')">CALCULATE Filter</button>
          <button class="example-btn" onclick="loadExample('running')">Running Total</button>
        </div>
      </div>
 
      <div>
        <div class="input-label">Explanation Style</div>
        <select id="levelSelect">
          <option value="simple">🟢 Simple (Beginner-friendly)</option>
          <option value="intermediate" selected>🟡 Intermediate (With context)</option>
          <option value="technical">🔴 Technical (Deep dive)</option>
        </select>
      </div>
 
      <button class="btn" id="explainBtn" onclick="explainDAX()">
        <span class="spinner hidden" id="spinner"></span>
        <span id="btnText">▶ Explain This DAX</span>
      </button>
 
      <div class="error-box" id="errorBox"></div>
    </div>
  </div>
 
  <!-- Right Panel: Output -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">✨ Plain English Explanation</span>
    </div>
    <div class="panel-content">
      <div class="output-content">
        <div id="emptyState" class="empty-state">
          <div class="empty-icon">⟨ ⟩</div>
          <div class="empty-text">Paste a DAX measure and click Explain<br>to get started</div>
        </div>
 
        <div id="result" style="display: none;">
          <div class="result-section">
            <div class="result-header">📝 What This Measure Does</div>
            <div class="result-body" id="summaryText"></div>
          </div>
 
          <div class="result-section">
            <div class="result-header">🔍 Line-by-Line Breakdown</div>
            <div class="result-body" id="breakdownText"></div>
          </div>
 
          <div class="result-section">
            <div class="result-header">💡 When to Use This</div>
            <div class="result-body" id="useCaseText"></div>
          </div>
 
          <button class="copy-btn" onclick="copyResult()">📋 Copy Explanation</button>
        </div>
      </div>
    </div>
  </div>
</main>
 
<script>
  const EXAMPLES = {
    yoy: `Total Sales YoY % = DIVIDE(
  [Total Sales] - CALCULATE([Total Sales], SAMEPERIODLASTYEAR('Date'[Date])),
  CALCULATE([Total Sales], SAMEPERIODLASTYEAR('Date'[Date]))
)`,
    rank: `Sales Rank = RANKX(
  ALL('Products'[ProductName]),
  [Total Sales],
  ,
  DESC,
  DENSE
)`,
    calculate: `Sales in Ontario = CALCULATE(
  [Total Sales],
  'Geography'[Province] = "Ontario",
  'Date'[Year] = 2024
)`,
    running: `Running Total Sales = CALCULATE(
  [Total Sales],
  FILTER(
    ALL('Date'[Date]),
    'Date'[Date] <= MAX('Date'[Date])
  )
)`
  };
 
  function loadExample(key) {
    document.getElementById('daxInput').value = EXAMPLES[key];
  }
 
  async function explainDAX() {
    const daxCode = document.getElementById('daxInput').value.trim();
    const level = document.getElementById('levelSelect').value;
    const btn = document.getElementById('explainBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    const errorBox = document.getElementById('errorBox');
    const result = document.getElementById('result');
    const emptyState = document.getElementById('emptyState');
 
    if (!daxCode) {
      errorBox.textContent = '⚠ Please paste a DAX measure first';
      errorBox.style.display = 'block';
      document.getElementById('daxInput').focus();
      return;
    }
 
    btn.disabled = true;
    spinner.classList.remove('hidden');
    btnText.style.display = 'none';
    errorBox.style.display = 'none';
    result.style.display = 'none';
    emptyState.style.display = 'none';
 
    try {
      const response = await fetch('/.netlify/functions/explain-dax', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ daxCode, level })
      });
 
      if (!response.ok) {
        const errData = await response.json();
        throw new Error(errData.error || 'API error');
      }
 
      const data = await response.json();
 
      document.getElementById('summaryText').innerHTML = `<p>${escapeHtml(data.summary)}</p>`;
 
      const breakdown = data.breakdown.map(item => `
        <div class="breakdown-item">
          <span class="code-tag">${escapeHtml(item.code)}</span>
          <span class="breakdown-text">${escapeHtml(item.explanation)}</span>
        </div>
      `).join('');
      document.getElementById('breakdownText').innerHTML = breakdown;
 
      document.getElementById('useCaseText').innerHTML = `<p>${escapeHtml(data.useCase)}</p>`;
 
      emptyState.style.display = 'none';
      result.style.display = 'block';
 
    } catch (error) {
      errorBox.textContent = '⚠ ' + error.message;
      errorBox.style.display = 'block';
      emptyState.style.display = 'flex';
    } finally {
      btn.disabled = false;
      spinner.classList.add('hidden');
      btnText.style.display = 'block';
    }
  }
 
  function escapeHtml(text) {
    const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
    return text.replace(/[&<>"']/g, m => map[m]);
  }
 
  function copyResult() {
    const summary = document.getElementById('summaryText').textContent;
    const breakdown = document.getElementById('breakdownText').innerText;
    const useCase = document.getElementById('useCaseText').textContent;
    const full = `WHAT IT DOES:\n${summary}\n\nBREAKDOWN:\n${breakdown}\n\nWHEN TO USE:\n${useCase}`;
    
    navigator.clipboard.writeText(full).then(() => {
      const btn = document.querySelector('.copy-btn');
      const original = btn.textContent;
      btn.textContent = '✓ Copied!';
      setTimeout(() => btn.textContent = original, 2000);
    });
  }
 
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') explainDAX();
  });
</script>
</body>
</html>
