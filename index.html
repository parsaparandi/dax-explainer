<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAX Explainer Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1e3a8a;
    --navy-dark: #1e40af;
    --light-blue: #f0f9ff;
    --sky-blue: #e0f2fe;
    --blue: #3b82f6;
    --sky: #06b6d4;
    --orange: #f97316;
    --text-dark: #1f2937;
    --text-muted: #6b7280;
    --white: #ffffff;
    --shadow: 0 4px 12px rgba(30, 58, 138, 0.08);
    --shadow-lg: 0 10px 25px rgba(30, 58, 138, 0.12);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
  }

  body {
    background: linear-gradient(135deg, var(--light-blue) 0%, #dbeafe 100%);
    color: var(--text-dark);
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
  }

  /* Header */
  header {
    background: var(--white);
    padding: 28px 40px;
    box-shadow: var(--shadow);
    border-bottom: 3px solid var(--navy);
  }

  .header-content {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--navy), var(--sky));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 700;
    color: var(--white);
  }

  .logo-text {
    display: flex;
    flex-direction: column;
  }

  .logo-title {
    font-size: 24px;
    font-weight: 700;
    color: var(--navy);
    line-height: 1;
  }

  .logo-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    background: #ecfdf5;
    border-radius: 8px;
    font-size: 13px;
    color: #047857;
    font-weight: 500;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #10b981;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* Main Container */
  main {
    max-width: 1400px;
    margin: 40px auto;
    padding: 0 40px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    min-height: calc(100vh - 180px);
  }

  @media (max-width: 1024px) {
    main {
      grid-template-columns: 1fr;
      padding: 0 20px;
    }
  }

  /* Panels */
  .panel {
    background: var(--white);
    border-radius: 16px;
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .panel-header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-dark) 100%);
    padding: 24px 28px;
    color: var(--white);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .panel-content {
    flex: 1;
    padding: 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
  }

  /* Input Elements */
  textarea {
    flex: 1;
    min-height: 280px;
    padding: 16px;
    border: 2px solid var(--sky-blue);
    border-radius: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text-dark);
    resize: none;
    outline: none;
    background: #fafafa;
    transition: all 0.3s ease;
  }

  textarea:focus {
    border-color: var(--navy);
    background: var(--white);
    box-shadow: 0 0 0 4px rgba(30, 58, 138, 0.1);
  }

  textarea::placeholder {
    color: var(--text-muted);
  }

  /* Labels */
  .input-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--navy);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 8px;
  }

  /* Examples */
  .examples {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .example-btn {
    padding: 8px 16px;
    background: var(--sky-blue);
    border: 2px solid var(--sky);
    border-radius: 8px;
    color: var(--navy);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Poppins', sans-serif;
  }

  .example-btn:hover {
    background: var(--sky);
    color: var(--white);
  }

  /* Select Dropdown */
  select {
    padding: 12px 14px;
    border: 2px solid var(--sky-blue);
    border-radius: 10px;
    font-family: 'Poppins', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--navy);
    background: var(--white);
    cursor: pointer;
    outline: none;
    transition: all 0.2s;
  }

  select:hover {
    border-color: var(--navy);
  }

  select:focus {
    border-color: var(--navy);
    box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .btn {
    flex: 1;
    min-width: 140px;
    padding: 14px 24px;
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-dark) 100%);
    color: var(--white);
    border: none;
    border-radius: 10px;
    font-family: 'Poppins', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    box-shadow: 0 4px 12px rgba(30, 58, 138, 0.2);
  }

  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(30, 58, 138, 0.3);
  }

  .btn:active {
    transform: translateY(0);
  }

  .btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  .spinner {
    width: 14px;
    height: 14px;
    border: 2.5px solid rgba(255, 255, 255, 0.3);
    border-top-color: var(--white);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .spinner.hidden {
    display: none;
  }

  /* Output Area */
  .output-content {
    flex: 1;
    overflow-y: auto;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
    text-align: center;
    gap: 16px;
  }

  .empty-icon {
    font-size: 56px;
    opacity: 0.3;
  }

  .empty-text {
    font-size: 14px;
    line-height: 1.6;
  }

  /* Result Sections */
  #result {
    display: none;
  }

  #result.visible {
    display: flex;
    flex-direction: column;
    gap: 16px;
    animation: fadeUp 0.4s ease;
  }

  @keyframes fadeUp {
    from {
      opacity: 0;
      transform: translateY(16px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .result-section {
    background: linear-gradient(135deg, var(--light-blue) 0%, var(--sky-blue) 100%);
    border: 2px solid var(--sky);
    border-radius: 12px;
    overflow: hidden;
  }

  .result-header {
    padding: 14px 18px;
    background: var(--sky);
    color: var(--white);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .result-body {
    padding: 18px;
    font-size: 14px;
    line-height: 1.8;
    color: var(--text-dark);
  }

  .result-body p {
    margin-bottom: 12px;
  }

  .result-body p:last-child {
    margin-bottom: 0;
  }

  .breakdown-item {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 14px;
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(6, 182, 212, 0.2);
  }

  .breakdown-item:last-child {
    border-bottom: none;
    margin-bottom: 0;
    padding-bottom: 0;
  }

  .code-tag {
    background: var(--white);
    border: 1.5px solid var(--navy);
    color: var(--navy);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
    font-family: 'JetBrains Mono', monospace;
  }

  .breakdown-text {
    color: #1f2937;
    font-size: 13px;
    line-height: 1.7;
  }

  /* Error Box */
  .error-box {
    background: #fee2e2;
    border: 2px solid #fca5a5;
    border-radius: 10px;
    padding: 14px;
    color: #991b1b;
    font-size: 13px;
    display: none;
    font-weight: 500;
  }

  /* Copy Button */
  .copy-btn {
    align-self: flex-end;
    padding: 10px 18px;
    background: linear-gradient(135deg, var(--orange) 0%, #ea580c 100%);
    border: none;
    border-radius: 8px;
    color: var(--white);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 12px;
    font-family: 'Poppins', sans-serif;
  }

  .copy-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(249, 115, 22, 0.2);
  }

  /* Scrollbar */
  ::-webkit-scrollbar {
    width: 8px;
  }

  ::-webkit-scrollbar-track {
    background: transparent;
  }

  ::-webkit-scrollbar-thumb {
    background: var(--sky-blue);
    border-radius: 4px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: var(--sky);
  }

  /* Footer */
  footer {
    text-align: center;
    padding: 20px;
    color: var(--text-muted);
    font-size: 12px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<header>
  <div class="header-content">
    <div class="logo">
      <div class="logo-icon">Σ</div>
      <div class="logo-text">
        <div class="logo-title">DAX Explainer</div>
        <div class="logo-subtitle">Pro Edition</div>
      </div>
    </div>
    <div class="status">
      <div class="status-dot"></div>
      Ready to Explain
    </div>
  </div>
</header>

<main>
  <!-- Input Panel -->
  <div class="panel">
    <div class="panel-header">📊 DAX Measure Input</div>
    <div class="panel-content">
      <textarea 
        id="daxInput"
        placeholder="Paste your DAX measure here...

Example:
Total Sales YoY % = DIVIDE(
  [Total Sales] - CALCULATE([Total Sales], SAMEPERIODLASTYEAR('Date'[Date])),
  CALCULATE([Total Sales], SAMEPERIODLASTYEAR('Date'[Date]))
)"></textarea>

      <div>
        <div class="input-label">Quick Examples</div>
        <div class="examples">
          <button class="example-btn" onclick="loadExample('yoy')">YoY Growth %</button>
          <button class="example-btn" onclick="loadExample('rank')">RANKX Ranking</button>
          <button class="example-btn" onclick="loadExample('calculate')">CALCULATE Filter</button>
          <button class="example-btn" onclick="loadExample('running')">Running Total</button>
        </div>
      </div>

      <div>
        <div class="input-label">Explanation Style</div>
        <select id="levelSelect">
          <option value="simple">🟢 Simple (Beginner-friendly)</option>
          <option value="intermediate" selected>🟡 Intermediate (With context)</option>
          <option value="technical">🔴 Technical (Deep dive)</option>
        </select>
      </div>

      <div class="controls">
        <button class="btn" id="explainBtn" onclick="explainDAX()">
          <span class="spinner hidden" id="spinner"></span>
          <span id="btnText">▶ Explain This DAX</span>
        </button>
      </div>

      <div class="error-box" id="errorBox"></div>
    </div>
  </div>

  <!-- Output Panel -->
  <div class="panel">
    <div class="panel-header">✨ Plain English Explanation</div>
    <div class="panel-content">
      <div class="output-content">
        <div id="emptyState" class="empty-state">
          <div class="empty-icon">📝</div>
          <div class="empty-text">Paste a DAX measure and click<br><strong>Explain This DAX</strong> to get started</div>
        </div>

        <div id="result">
          <div class="result-section">
            <div class="result-header">💡 What This Measure Does</div>
            <div class="result-body" id="summaryText"></div>
          </div>

          <div class="result-section">
            <div class="result-header">🔍 Line-by-Line Breakdown</div>
            <div class="result-body" id="breakdownText"></div>
          </div>

          <div class="result-section">
            <div class="result-header">📌 When to Use This</div>
            <div class="result-body" id="useCaseText"></div>
          </div>

          <button class="copy-btn" onclick="copyResult()">📋 Copy Explanation</button>
        </div>
      </div>
    </div>
  </div>
</main>

<footer>
  Built with AI • Powered by Claude
</footer>

<script>
  const EXAMPLES = {
    yoy: `Total Sales YoY % = DIVIDE(
  [Total Sales] - CALCULATE([Total Sales], SAMEPERIODLASTYEAR('Date'[Date])),
  CALCULATE([Total Sales], SAMEPERIODLASTYEAR('Date'[Date]))
)`,
    rank: `Sales Rank = RANKX(
  ALL('Products'[ProductName]),
  [Total Sales],
  ,
  DESC,
  DENSE
)`,
    calculate: `Sales in Ontario = CALCULATE(
  [Total Sales],
  'Geography'[Province] = "Ontario",
  'Date'[Year] = 2024
)`,
    running: `Running Total Sales = CALCULATE(
  [Total Sales],
  FILTER(
    ALL('Date'[Date]),
    'Date'[Date] <= MAX('Date'[Date])
  )
)`
  };

  function loadExample(key) {
    document.getElementById('daxInput').value = EXAMPLES[key];
  }

  async function explainDAX() {
    const daxCode = document.getElementById('daxInput').value.trim();
    const level = document.getElementById('levelSelect').value;
    const btn = document.getElementById('explainBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    const errorBox = document.getElementById('errorBox');
    const result = document.getElementById('result');
    const emptyState = document.getElementById('emptyState');

    if (!daxCode) {
      errorBox.textContent = '⚠ Please paste a DAX measure first';
      errorBox.style.display = 'block';
      document.getElementById('daxInput').focus();
      return;
    }

    btn.disabled = true;
    spinner.classList.remove('hidden');
    btnText.style.display = 'none';
    errorBox.style.display = 'none';
    result.classList.remove('visible');
    emptyState.style.display = 'none';

    try {
      const response = await fetch('/.netlify/functions/explain-dax', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ daxCode, level })
      });

      if (!response.ok) {
        const errData = await response.json();
        throw new Error(errData.error || 'API error');
      }

      const data = await response.json();

      document.getElementById('summaryText').innerHTML = `<p>${escapeHtml(data.summary)}</p>`;

      const breakdown = data.breakdown.map(item => `
        <div class="breakdown-item">
          <span class="code-tag">${escapeHtml(item.code)}</span>
          <span class="breakdown-text">${escapeHtml(item.explanation)}</span>
        </div>
      `).join('');
      document.getElementById('breakdownText').innerHTML = breakdown;

      document.getElementById('useCaseText').innerHTML = `<p>${escapeHtml(data.useCase)}</p>`;

      emptyState.style.display = 'none';
      result.classList.add('visible');

    } catch (error) {
      errorBox.textContent = '⚠ ' + error.message;
      errorBox.style.display = 'block';
      emptyState.style.display = 'flex';
    } finally {
      btn.disabled = false;
      spinner.classList.add('hidden');
      btnText.style.display = 'block';
    }
  }

  function escapeHtml(text) {
    const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
    return text.replace(/[&<>"']/g, m => map[m]);
  }

  function copyResult() {
    const summary = document.getElementById('summaryText').textContent;
    const breakdown = document.getElementById('breakdownText').innerText;
    const useCase = document.getElementById('useCaseText').textContent;
    const full = `WHAT IT DOES:\n${summary}\n\nBREAKDOWN:\n${breakdown}\n\nWHEN TO USE:\n${useCase}`;
    
    navigator.clipboard.writeText(full).then(() => {
      const btn = document.querySelector('.copy-btn');
      const original = btn.textContent;
      btn.textContent = '✓ Copied!';
      setTimeout(() => btn.textContent = original, 2000);
    });
  }

  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') explainDAX();
  });
</script>
</body>
</html>
